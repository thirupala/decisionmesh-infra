name: decisionmesh

networks:
  internal:
    name: decisionmesh_internal

services:

  api:
    image: ${API_IMAGE:?API_IMAGE must be set in .env.prod}
    container_name: dm-api
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE:   prod
      QUARKUS_HTTP_PORT: 8080
      VAULT_TOKEN:       ${VAULT_TOKEN:?VAULT_TOKEN must be set in .env.prod}
      VAULT_ADDR:        http://openbao:8200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  postgres:
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 320m

  kafka:
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768m

  openbao:
    restart: unless-stopped
    command: server -config=/openbao/config/openbao.hcl
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    healthcheck:
      test: ["CMD-SHELL", "bao status -address=http://127.0.0.1:8200 | grep -q 'Sealed.*false'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - openbao-data:/openbao/data
      - ./config/openbao.hcl:/openbao/config/openbao.hcl:ro
    deploy:
      resources:
        limits:
          memory: 192m

  ollama:
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3g

volumes:
  postgres-data:
  kafka-data:
  openbao-data:
  ollama-data:
