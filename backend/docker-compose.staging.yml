# ============================================================
# docker-compose.staging.yml — standalone staging stack
# Completely self-contained; does NOT extend docker-compose.yml.
#
# Key differences from prod:
#   - OpenBao runs in DEV mode (auto-unseals, fixed token, no init needed)
#   - Caddy is commented out (use docker-compose.gateway.yml instead)
#   - postgres uses pgvector image (same as prod)
#
# Start:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
# ============================================================

name: decisionmesh-staging

networks:
  internal:
    name: decisionmesh-staging_internal
    driver: bridge

services:

  # ----------------------------------------------------------
  # API
  # ----------------------------------------------------------
  api:
    image: ${API_IMAGE:?API_IMAGE must be set in .env.staging}
    container_name: dm-api-staging
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE:   staging
      QUARKUS_HTTP_PORT: 8081
      VAULT_TOKEN:       ${VAULT_TOKEN:-staging-root-token}
      VAULT_ADDR:        http://openbao:8200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  # ----------------------------------------------------------
  # PostgreSQL — pgvector required for vector embeddings
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-decisionmesh}
      POSTGRES_USER:     ${DB_USER:-decisionmesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.staging}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-decisionmesh} -d ${DB_NAME:-decisionmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.staging}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320m
    networks:
      - internal

  # ----------------------------------------------------------
  # Kafka — KRaft mode
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID:                                  1
      KAFKA_PROCESS_ROLES:                            broker,controller
      KAFKA_LISTENERS:                                PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS:                     PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES:                CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:           PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS:                 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:         1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:            1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:                "true"
      KAFKA_CLUSTER_ID:                               ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID must be set in .env.staging}
      KAFKA_HEAP_OPTS:                                "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-staging-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - internal

  # ----------------------------------------------------------
  # OpenBao — DEV MODE for staging
  # Auto-unseals on start. Token is pinned to staging-root-token.
  # Data is lost on container restart — acceptable for staging.
  # No init, no unseal key management needed.
  # ----------------------------------------------------------
  openbao:
    image: hashicorp/vault:1.15
    container_name: decisionmesh-staging-openbao-1
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN:-staging-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 | grep -q 'Sealed.*false'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192m
    networks:
      - internal

  # ----------------------------------------------------------
  # Ollama — CPU-only; disable to save RAM if not needed
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ollama-staging-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3g
    networks:
      - internal

volumes:
  postgres-staging-data:
  kafka-staging-data:
  ollama-staging-data:
