name: decisionmesh-gateway

networks:
  prod_net:
    external: true
    name: decisionmesh_internal
  staging_net:
    external: true
    name: decisionmesh-staging_internal

services:
  caddy:
    image: caddy:2-alpine
    container_name: dm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - prod_net
      - staging_net

volumes:
  caddy-data:
  caddy-config:
